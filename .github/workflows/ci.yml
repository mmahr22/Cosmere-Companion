name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run :core unit tests
        run: ./gradlew :core:test --stacktrace

      - name: Upload core test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: core/build/reports/tests/test
          if-no-files-found: ignore

  app:
    name: App build & lint (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Exports ANDROID_HOME/ANDROID_SDK_ROOT and accepts SDK licenses, which
      # is what makes settings.gradle.kts include the :app module in CI (it's
      # otherwise skipped in headless environments with no Android SDK).
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform and build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
